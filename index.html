<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MockTracker Pro — Ace Every Exam</title>
  <meta name="description" content="The ultimate mock test tracker for SSC, RRB, and Bank exam aspirants."/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    /* ─── RESET ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; }

    :root {
      --brand:   #6366f1;
      --purple:  #a855f7;
      --fuchsia: #d946ef;
      --bg:      #06030f;
      --nav-h:   54px;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: #f1f5f9;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* ─── NOISE TEXTURE OVERLAY ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* ─── GRAD UTILS ─── */
    .grad-text {
      background: linear-gradient(130deg, #818cf8 0%, #d946ef 55%, #a855f7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ─── NAVBAR ─── */
    nav {
      position: relative; z-index: 10;
      height: var(--nav-h);
      display: flex; align-items: center;
      padding: 0 24px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      flex-shrink: 0;
    }
    .nav-inner {
      max-width: 900px; width: 100%; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 9px;
      text-decoration: none;
    }
    .nav-icon {
      width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
      background: linear-gradient(135deg, #6366f1, #a855f7, #d946ef);
      box-shadow: 0 4px 14px rgba(99,102,241,0.45);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: white;
    }
    .nav-brand {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1rem; color: white; white-space: nowrap;
    }
    .nav-brand span { color: #6366f1; }

    .nav-badge {
      font-size: 0.68rem; font-weight: 700;
      padding: 4px 11px; border-radius: 999px;
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.25);
      color: #a5b4fc;
      letter-spacing: 0.04em;
    }

    /* ─── HERO ─── */
    .hero {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 24px;
      overflow: hidden;
      z-index: 1;
    }

    /* Animated background blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      will-change: transform;
    }
    .blob-1 {
      width: min(500px, 80vw);
      height: min(500px, 80vw);
      background: radial-gradient(circle, rgba(99,102,241,0.22) 0%, transparent 70%);
      top: -20%; left: -15%;
      animation: drift1 16s ease-in-out infinite;
    }
    .blob-2 {
      width: min(420px, 70vw);
      height: min(420px, 70vw);
      background: radial-gradient(circle, rgba(168,85,247,0.18) 0%, transparent 70%);
      bottom: -15%; right: -10%;
      animation: drift2 18s ease-in-out infinite;
    }
    .blob-3 {
      width: min(300px, 55vw);
      height: min(300px, 55vw);
      background: radial-gradient(circle, rgba(217,70,239,0.10) 0%, transparent 70%);
      top: 40%; left: 50%; transform: translateX(-50%);
      animation: drift1 12s ease-in-out infinite reverse;
    }
    @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,40px)} }
    @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-40px,-30px)} }

    /* Subtle grid lines */
    .hero::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 0%, transparent 100%);
      pointer-events: none;
    }

    /* Content wrapper */
    .hero-content {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; gap: 0;
      max-width: 580px; width: 100%;
      /* stagger-in animation */
      animation: contentIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes contentIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Eyebrow */
    .eyebrow {
      display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
      margin-bottom: 20px;
      animation: contentIn 0.9s 0.05s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .epill {
      font-size: 0.66rem; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 999px;
    }
    .ep1 { background: rgba(99,102,241,0.1);  border: 1px solid rgba(99,102,241,0.28); color: #a5b4fc; }
    .ep2 { background: rgba(168,85,247,0.09); border: 1px solid rgba(168,85,247,0.28); color: #c4b5fd; }
    .ep3 { background: rgba(217,70,239,0.09); border: 1px solid rgba(217,70,239,0.28); color: #f0abfc; }

    /* Headline */
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6.5vw, 3.4rem);
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: -0.03em;
      color: white;
      margin-bottom: 14px;
      animation: contentIn 0.9s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* Subtitle */
    .sub {
      font-size: clamp(0.82rem, 2.2vw, 0.96rem);
      color: #4a5568;
      line-height: 1.6;
      max-width: 360px;
      margin-bottom: 22px;
      animation: contentIn 0.9s 0.18s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* Trust pills */
    .trust {
      display: flex; gap: 7px; flex-wrap: wrap; justify-content: center;
      margin-bottom: 32px;
      animation: contentIn 0.9s 0.26s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .tpill {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 999px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 0.72rem; font-weight: 600; color: #64748b;
    }
    .tpill i { font-size: 0.62rem; }

    /* ─── CTA BUTTON ─── */
    .cta-wrap {
      animation: contentIn 0.9s 0.34s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .cta-btn {
      position: relative;
      display: inline-flex; align-items: center; gap: 10px;
      padding: 15px 36px;
      border-radius: 16px;
      font-family: 'Syne', sans-serif;
      font-size: clamp(0.88rem, 2.5vw, 1rem);
      font-weight: 800;
      color: white;
      background: linear-gradient(135deg, #6366f1, #a855f7, #d946ef);
      box-shadow:
        0 0 0 1px rgba(99,102,241,0.3),
        0 8px 32px rgba(99,102,241,0.4),
        0 0 60px rgba(168,85,247,0.15);
      border: none; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.3s;
      overflow: hidden;
      min-width: 220px;
      justify-content: center;
    }
    .cta-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent 60%);
      border-radius: inherit;
    }
    .cta-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow:
        0 0 0 1px rgba(99,102,241,0.4),
        0 12px 40px rgba(99,102,241,0.55),
        0 0 80px rgba(168,85,247,0.25);
    }
    .cta-btn:active { transform: translateY(0) scale(0.99); }

    /* Shimmer sweep on button */
    .cta-btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: skewX(-15deg);
      animation: shimmer 3.5s ease-in-out infinite;
    }
    @keyframes shimmer { 0%,100%{left:-100%} 50%{left:160%} }

    .cta-icon {
      width: 22px; height: 22px; border-radius: 6px;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem;
      transition: transform 0.2s;
    }
    .cta-btn:hover .cta-icon { transform: translateX(2px); }

    /* Small note under button */
    .cta-note {
      margin-top: 11px;
      font-size: 0.68rem; color: #1e293b;
      animation: contentIn 0.9s 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* ─── LAUNCH TRANSITION OVERLAY ─── */
    /* 
      Animation: "Supernova Burst"
      1. A radial ring of light erupts from the button's exact position
      2. It expands rapidly, eating the screen
      3. At full cover, a reverse-spin vortex of lines briefly appears
      4. Then the whole thing fades to the brand gradient → navigates
    */

    #launch-overlay {
      position: fixed; inset: 0; z-index: 9999;
      pointer-events: none;
      opacity: 0;
    }
    #launch-overlay.active { pointer-events: all; }

    /* The expanding circle */
    #launch-circle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at center,
        #ffffff 0%,
        #d946ef 20%,
        #a855f7 40%,
        #6366f1 65%,
        #06030f 100%
      );
      transform: scale(0);
      transform-origin: center center;
      transition: transform 0s; /* set by JS */
      will-change: transform;
    }

    /* Scan lines that appear during the burst */
    #launch-lines {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(99,102,241,0.06) 3px,
        rgba(99,102,241,0.06) 4px
      );
      opacity: 0;
      transition: opacity 0.15s;
    }
    #launch-overlay.lines-show #launch-lines { opacity: 1; }

    /* Center logo pulse during launch */
    #launch-logo {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(135deg, #6366f1, #a855f7, #d946ef);
      box-shadow: 0 0 60px rgba(99,102,241,0.9), 0 0 120px rgba(168,85,247,0.5);
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 1.4rem;
      opacity: 0;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    }
    #launch-overlay.logo-show #launch-logo {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    /* Mobile full-width CTA */
    @media (max-width: 400px) {
      .cta-btn { width: 90vw; }
    }

    /* ─── BOTTOM MICRO DETAIL ─── */
    .corner-detail {
      position: absolute;
      font-size: 0.6rem; color: #1a1a2e;
      font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase;
      z-index: 2;
      animation: contentIn 1.2s 0.6s both;
    }
    .corner-detail.bl { bottom: 16px; left: 22px; }
    .corner-detail.br { bottom: 16px; right: 22px; }

    /* Animated dot */
    .live-dot {
      display: inline-block;
      width: 5px; height: 5px; border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
      margin-right: 5px;
      animation: pulse-dot 2s ease-in-out infinite;
      vertical-align: middle;
    }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    /* ─── SCROLL HINT (hidden, just for feel) ─── */
    /* nothing — truly scroll-free */

  </style>
</head>
<body>

  <!-- ══ NAVBAR ══ -->
  <nav>
    <div class="nav-inner">
      <a href="#" class="nav-logo">
        <div class="nav-icon">
          <i class="fa-solid fa-chart-line"></i>
        </div>
        <span class="nav-brand">MockTracker <span>Pro</span></span>
      </a>
      <span class="nav-badge">100% Free</span>
    </div>
  </nav>

  <!-- ══ HERO ══ -->
  <section class="hero">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="hero-content">

      <!-- Eyebrow pills -->
      <div class="eyebrow">
        <span class="epill ep1">SSC CGL</span>
        <span class="epill ep2">RRB NTPC</span>
        <span class="epill ep3">Bank PO</span>
      </div>

      <!-- Headline -->
      <h1>Stop Guessing.<br/><span class="grad-text">Start Winning</span><br/>Every Mock.</h1>

      <!-- Subtitle -->
      <p class="sub">The smartest mock tracker for Indian competitive exams.</p>

      <!-- Trust pills -->
      <div class="trust">
        <div class="tpill">
          <i class="fa-solid fa-users" style="color:#818cf8"></i>
          10,000+ Aspirants
        </div>
        <div class="tpill">
          <i class="fa-solid fa-star" style="color:#facc15"></i>
          4.9 Rating
        </div>
        <div class="tpill">
          <i class="fa-solid fa-shield-halved" style="color:#4ade80"></i>
          Always Free
        </div>
      </div>

      <!-- CTA -->
      <div class="cta-wrap">
        <button class="cta-btn" id="startBtn" onclick="triggerLaunch(event)">
          <span class="cta-icon"><i class="fa-solid fa-rocket"></i></span>
          Start Tracking Free
        </button>
      </div>
      <p class="cta-note">No account needed &nbsp;·&nbsp; Works on any device</p>

    </div><!-- /hero-content -->

    <!-- Corner micro-details -->
    <div class="corner-detail bl">
      <span class="live-dot"></span>10K+ active
    </div>
    <div class="corner-detail br">v2.0 &nbsp;·&nbsp; 2025</div>

  </section>

  <!-- ══ LAUNCH TRANSITION OVERLAY ══ -->
  <div id="launch-overlay">
    <div id="launch-circle"></div>
    <div id="launch-lines"></div>
    <div id="launch-logo">
      <i class="fa-solid fa-chart-line"></i>
    </div>
  </div>

  <script>
    function triggerLaunch(e) {
      const btn    = document.getElementById('startBtn');
      const overlay = document.getElementById('launch-overlay');
      const circle  = document.getElementById('launch-circle');

      // Get button center in viewport coords
      const rect = btn.getBoundingClientRect();
      const cx   = rect.left + rect.width  / 2;
      const cy   = rect.top  + rect.height / 2;

      // Size the circle: needs to cover the entire viewport from the button's position
      // Max distance from button center to any corner
      const dx = Math.max(cx, window.innerWidth  - cx);
      const dy = Math.max(cy, window.innerHeight - cy);
      const radius = Math.sqrt(dx * dx + dy * dy) * 2.1; // diameter

      // Position circle centered on button
      circle.style.width  = radius + 'px';
      circle.style.height = radius + 'px';
      circle.style.left   = (cx - radius / 2) + 'px';
      circle.style.top    = (cy - radius / 2) + 'px';
      circle.style.transform = 'scale(0)';
      circle.style.transition = 'none';

      // Activate overlay
      overlay.classList.add('active');
      overlay.style.opacity = '1';

      // Force reflow
      circle.getBoundingClientRect();

      // Phase 1: Expand circle (600ms)
      circle.style.transition = 'transform 620ms cubic-bezier(0.55, 0, 0.1, 1)';
      circle.style.transform  = 'scale(1)';

      // Phase 2: Show scanlines at 300ms
      setTimeout(() => {
        overlay.classList.add('lines-show');
      }, 300);

      // Phase 3: Show center logo pulse at 450ms
      setTimeout(() => {
        overlay.classList.add('logo-show');
      }, 450);

      // Phase 4: Navigate at 750ms
      setTimeout(() => {
        window.location.href = 'app.html';
      }, 750);
    }
  </script>

</body>
</html>
